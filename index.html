<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>FORGE — Christos &amp; Maria</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#0e1220; --card:#141a27; --card2:#1b2231; --line:#242c3d;
    --ink:#eef2f8; --ink2:#c3cbd9; --muted:#7c869a; --good:#22c55e;
    --accent:#3b82f6; --accent2:#22d3ee; --soft:rgba(59,130,246,.16); --softline:rgba(59,130,246,.4);
    --shadow:0 10px 30px rgba(0,0,0,.45); --nav-h:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); line-height:1.42; overflow-x:hidden;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    background:
      radial-gradient(1200px 380px at 50% -140px, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
      var(--bg);
    transition:background .35s;}
  .app{max-width:540px; margin:0 auto; position:relative; min-height:100vh;}

  /* ---------- top bar ---------- */
  .bar{position:sticky; top:0; z-index:30; padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:linear-gradient(180deg, var(--bg) 55%, transparent);}
  .brand{display:flex; align-items:center; gap:10px;}
  .logo{width:34px;height:34px;border-radius:10px; display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 6px 16px var(--soft); color:#fff;}
  .logo svg{width:19px;height:19px;}
  .brand b{font-size:18px; letter-spacing:.5px; font-weight:800;}
  .brand span{display:block; font-size:11px; color:var(--muted); font-weight:600; margin-top:-2px; letter-spacing:.3px;}
  .who{display:flex; gap:7px;}
  .who button{width:38px;height:38px;border-radius:50%; border:1.5px solid var(--line); background:var(--card);
    color:var(--muted); font-weight:800; font-size:15px; cursor:pointer; transition:.18s; display:grid;place-items:center;}
  .who button.on{color:#fff; border-color:transparent; background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 6px 14px var(--soft); transform:translateY(-1px);}

  /* ---------- views ---------- */
  .view{padding:2px 16px 26px; animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1;transform:none;}}
  .h1{font-size:26px; font-weight:800; letter-spacing:-.3px; margin:6px 2px 2px;}
  .sub{color:var(--muted); font-size:12.5px; margin:0 2px 14px; font-weight:500;}

  /* segmented program pill */
  .seg{display:flex; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:4px; gap:4px; margin:0 0 14px;}
  .seg button{flex:1; border:0; background:transparent; color:var(--muted); font-weight:700; font-size:13px;
    padding:9px; border-radius:10px; cursor:pointer; transition:.16s;}
  .seg button.on{color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 4px 12px var(--soft);}

  /* day chips */
  .days{display:flex; gap:9px; overflow-x:auto; padding:2px 2px 12px; margin:0 -2px; scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; min-width:96px; border:1px solid var(--line); background:var(--card); color:var(--ink2);
    border-radius:14px; padding:11px 14px; cursor:pointer; transition:.16s; text-align:left;}
  .chip b{display:block; font-size:13.5px; font-weight:800; color:var(--ink);}
  .chip small{display:block; font-size:10.5px; color:var(--muted); margin-top:2px; font-weight:600; white-space:nowrap;}
  .chip.on{border-color:transparent; background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 26%, var(--card)), var(--card)); box-shadow:var(--shadow);}
  .chip.on b, .chip.on small{color:#fff;}

  /* hero ring card */
  .hero{background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 30%, var(--card)), var(--card));
    border:1px solid var(--line); border-radius:22px; padding:18px; margin:2px 0 16px; display:flex; align-items:center; gap:18px; box-shadow:var(--shadow);}
  .ring{position:relative; width:104px; height:104px; flex:0 0 auto;}
  .ring svg{transform:rotate(-90deg);}
  .ring .val{position:absolute; inset:0; display:grid; place-items:center; text-align:center;}
  .ring .val b{font-size:23px; font-weight:850; letter-spacing:-.5px; line-height:1;}
  .ring .val small{display:block; font-size:10px; color:var(--ink2); margin-top:3px; font-weight:700; letter-spacing:.4px;}
  .hero .info{min-width:0;}
  .hero .info h3{margin:0 0 3px; font-size:16.5px; font-weight:800;}
  .hero .info p{margin:0; font-size:12.5px; color:var(--ink2); font-weight:500;}
  .hero .tip{margin-top:9px; font-size:11.5px; color:var(--ink2); background:rgba(255,255,255,.06); border-radius:10px; padding:8px 10px; line-height:1.35;}

  /* exercise cards */
  .ex{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:15px 15px 13px; margin-bottom:13px;
    box-shadow:0 4px 14px rgba(0,0,0,.25); animation:rise .4s ease both; position:relative; overflow:hidden;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);}to{opacity:1;transform:none;}}
  .ex.done{border-color:color-mix(in srgb,var(--good) 55%, var(--line));}
  .ex.done:before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--good);}
  .ex .top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:11px;}
  .ex .nm{font-size:16px; font-weight:800; letter-spacing:-.2px;}
  .ex .badge{flex:0 0 auto; width:26px;height:26px;border-radius:50%; border:2px solid var(--line); display:grid;place-items:center; color:var(--muted); margin-top:1px;}
  .ex.done .badge{border-color:var(--good); background:var(--good); color:#04120a;}
  .ex.done .badge svg{width:15px;height:15px;}
  .tags{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:13px;}
  .tag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:6px 10px; border-radius:10px;
    background:var(--soft); color:#dfe8ff;}
  .tag.rest{background:var(--card2); color:var(--ink2); cursor:pointer; border:1px solid var(--line);}
  .tag svg{width:13px;height:13px; opacity:.9;}

  /* weight stepper */
  .wt{display:flex; align-items:center; gap:12px; background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:8px 10px; margin-bottom:13px;}
  .wt .lab{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-right:auto;}
  .stp{width:38px;height:38px;border-radius:11px; border:1px solid var(--line); background:var(--card); color:var(--ink);
    font-size:20px; font-weight:700; display:grid;place-items:center; cursor:pointer; transition:.12s;}
  .stp:active{transform:scale(.9); background:var(--soft);}
  .wt .num{display:flex; align-items:baseline; gap:3px; min-width:74px; justify-content:center;}
  .wt .num input{width:56px; background:transparent; border:0; color:var(--ink); font-size:22px; font-weight:850; text-align:center; letter-spacing:-.5px; padding:0;}
  .wt .num span{font-size:12px; color:var(--muted); font-weight:700;}
  .wt .bw{font-size:16px; font-weight:800; color:var(--ink); min-width:74px; text-align:center;}

  /* set pills */
  .sets{display:flex; gap:9px; flex-wrap:wrap;}
  .pill{width:44px;height:44px;border-radius:13px; border:2px solid var(--line); background:var(--card2);
    display:grid;place-items:center; font-weight:800; font-size:14px; color:var(--muted); cursor:pointer; transition:transform .12s, background .16s, border-color .16s;}
  .pill:active{transform:scale(.88);}
  .pill.on{border-color:transparent; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 5px 13px var(--soft); animation:pop .22s ease;}
  .pill.on svg{width:19px;height:19px;}
  @keyframes pop{0%{transform:scale(.7);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .note{font-size:11.5px; color:var(--muted); margin:11px 0 0; line-height:1.4;}

  /* progress view */
  .pcard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 15px; margin-bottom:13px; box-shadow:0 4px 14px rgba(0,0,0,.22);}
  .pcard h4{margin:0 0 3px; font-size:13px; font-weight:800; letter-spacing:.2px; display:flex; align-items:center; gap:8px;}
  .pcard h4 svg{width:15px;height:15px; color:var(--accent);}
  .prow{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-top:1px solid var(--line); font-size:13px;}
  .prow:first-of-type{border-top:0;}
  .prow .exn{color:var(--ink2); font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:10px;}
  .prow .w{font-weight:800; font-size:15px; white-space:nowrap;}
  .prow .up{color:var(--good); font-size:11px; font-weight:800; margin-left:6px;}
  .daylabel{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); font-weight:800; margin:16px 2px 8px;}

  /* guide view */
  .gcard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,.22);}
  .gcard .gh{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .gcard .gi{width:32px;height:32px;border-radius:10px; background:var(--soft); color:#dfe8ff; display:grid;place-items:center;}
  .gcard .gi svg{width:17px;height:17px;}
  .gcard h4{margin:0; font-size:14px; font-weight:800;}
  .gcard p{margin:0; font-size:12.8px; color:var(--ink2); line-height:1.5;}
  .disc{font-size:10.5px; color:var(--muted); text-align:center; padding:10px 6px 4px; line-height:1.5;}

  /* bottom nav */
  .nav{position:fixed; left:0; right:0; bottom:0; z-index:40; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom); background:color-mix(in srgb,var(--bg2) 92%, transparent);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--line);
    display:flex;}
  .nav .navin{max-width:540px; margin:0 auto; width:100%; display:flex;}
  .nav button{flex:1; border:0; background:transparent; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 6px; font-size:10.5px; font-weight:700; transition:.15s;}
  .nav button svg{width:23px;height:23px;}
  .nav button.on{color:var(--accent);}
  .nav button.on svg{filter:drop-shadow(0 3px 8px var(--soft));}

  /* rest timer modal */
  .modal{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:26px;
    background:rgba(4,6,12,.72); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .modal.show{display:flex; animation:fade .2s ease;}
  .tcard{width:100%; max-width:330px; background:var(--card); border:1px solid var(--line); border-radius:26px; padding:26px 22px 22px; text-align:center; box-shadow:var(--shadow);}
  .tcard .lbl{font-size:12px; color:var(--muted); font-weight:800; letter-spacing:1px; text-transform:uppercase;}
  .tring{position:relative; width:190px; height:190px; margin:14px auto 8px;}
  .tring svg{transform:rotate(-90deg);}
  .tring .tv{position:absolute; inset:0; display:grid; place-items:center; font-size:46px; font-weight:850; letter-spacing:-1px; font-variant-numeric:tabular-nums;}
  .trow{display:flex; gap:10px; margin-top:12px;}
  .trow button{flex:1; border:0; border-radius:14px; padding:14px; font-size:14px; font-weight:800; cursor:pointer; transition:.14s;}
  .trow .ghost{background:var(--card2); color:var(--ink2); border:1px solid var(--line);}
  .trow .prime{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 6px 16px var(--soft);}
  .trow button:active{transform:scale(.96);}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="brand">
      <div class="logo" id="logo"></div>
      <div><b id="brandName">FORGE</b><span id="brandSub">Today</span></div>
    </div>
    <div class="who" id="who">
      <button data-person="christos" class="on">C</button>
      <button data-person="wife">M</button>
    </div>
  </div>

  <div id="root"></div>
</div>

<nav class="nav"><div class="navin" id="nav"></div></nav>

<div class="modal" id="modal">
  <div class="tcard">
    <div class="lbl" id="tlbl">Rest</div>
    <div class="tring">
      <svg width="190" height="190" viewBox="0 0 190 190">
        <circle cx="95" cy="95" r="86" fill="none" stroke="var(--line)" stroke-width="12"></circle>
        <circle id="tprog" cx="95" cy="95" r="86" fill="none" stroke="url(#tg)" stroke-width="12" stroke-linecap="round" stroke-dasharray="540.4" stroke-dashoffset="0"></circle>
        <defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"></stop><stop offset="1" stop-color="var(--accent2)"></stop></linearGradient></defs>
      </svg>
      <div class="tv" id="tv">1:30</div>
    </div>
    <div class="trow">
      <button class="ghost" id="tMinus">−15s</button>
      <button class="ghost" id="tPlus">+15s</button>
      <button class="prime" id="tDone">Skip</button>
    </div>
  </div>
</div>

var CHEAT={
  christos:[
    ["flame","Progression","You're a returner — start at the shown weight and add load almost every week (+2.5 kg upper · +5 kg lower). Stall 3× → drop 10% and climb. Switch to 'add a rep then a little weight' only once that stops working."],
    ["apple","Nutrition — build","~3,250 kcal/day · protein 150–210 g. Small surplus, gain ~0.25–0.4 kg/week. A mini-cut later brings out abs."],
    ["pill","Supplements","Whey to hit protein · creatine 3–5 g/day · vitamin D3 · coffee pre-workout. Optional extras are in your private PDF guide. Skip fat burners & 'size' pills."]],
  wife:[
    ["flame","Progression","Start at the shown weight, add a little most weeks (+2.5–5 kg or +1 rep). Full stretch + a hard squeeze on glutes."],
    ["apple","Nutrition — fat loss","~1,730 kcal/day · protein 136–163 g (aim high — helps at 42). Gentle deficit, ~0.5%/week. Whole-food protein first."],
    ["pill","Supplements","Whey · creatine 3–5 g/day (great for muscle + bone at 42) · vitamin D3 + calcium ~1,000 mg · coffee pre-workout. Skip fat burners, 'toning' & cellulite pills. Cellulite: fat loss + firmer legs soften it, nothing erases it."]]
};

var S={ person:store.get("s_person","christos"), prog:store.get("s_prog","4-Day"), day:0, tab:"today" };
var $=function(id){return document.getElementById(id);};

/* reset ticks on a new calendar day */
(function(){ var t=new Date().toDateString(); if(store.get("s_lastDay","")!==t){
  try{ for(var i=localStorage.length-1;i>=0;i--){var k=localStorage.key(i); if(k&&k.indexOf("chk:")===0) localStorage.removeItem(k);} }catch(e){ for(var m in mem){ if(m.indexOf("chk:")===0) delete mem[m]; } }
  store.set("s_lastDay",t); } })();

function theme(){ var t=THEME[S.person], r=document.documentElement.style;
  r.setProperty("--accent",t.accent); r.setProperty("--accent2",t.accent2); r.setProperty("--soft",t.soft);
  var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute("content",t.bg);
  $("logo").innerHTML=ICON.dumbbell;
  Array.prototype.forEach.call($("who").children,function(b){ b.classList.toggle("on", b.dataset.person===S.person); });
}
function days(){ return DATA[S.person].programs[S.prog]; }
function ckey(){ return "chk:"+S.person+":"+S.prog+":"+S.day; }
function wkey(di,i){ return "w:"+S.person+":"+S.prog+":"+di+":"+i; }
function isNum(v){ return v!==""&&v!=null&&!isNaN(parseFloat(v)); }

/* ---------- NAV ---------- */
function renderNav(){
  var items=[["today","Today",ICON.dumbbell],["progress","Progress",ICON.chart],["guide","Guide",ICON.book]];
  $("nav").innerHTML=items.map(function(it){ return '<button data-tab="'+it[0]+'" class="'+(S.tab===it[0]?"on":"")+'">'+it[2]+'<span>'+it[1]+'</span></button>'; }).join("");
  Array.prototype.forEach.call($("nav").children,function(b){ b.onclick=function(){ S.tab=b.dataset.tab; render(); }; });
  $("brandSub").textContent=({today:"Today",progress:"Progress",guide:"Guide"})[S.tab];
}

/* ---------- TODAY ---------- */
function ring(frac,size,sw,r){ var c=2*Math.PI*r; var off=c*(1-frac);
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="'+sw+'"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="url(#hg)" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" style="transition:stroke-dashoffset .5s ease"/>'
    +'<defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent2)"/></linearGradient></defs></svg>';
}
function renderToday(){
  var dd=days(), d=dd[S.day], checks=store.get(ckey(),{});
  var tot=0,done=0; d.x.forEach(function(ex,i){ tot+=ex[1]; var a=checks[i]||[]; for(var s=0;s<ex[1];s++) if(a[s]) done++; });
  var frac=tot?done/tot:0, pct=Math.round(frac*100);
  var complete=done===tot&&tot>0;
  var parts=d.t.split(" · ");
  var h='<div class="view">';
  h+='<div class="h1">Today</div><div class="sub">'+DATA[S.person].name+" · "+S.prog+' program</div>';
  h+='<div class="seg" id="seg">'
    +'<button data-prog="4-Day" class="'+(S.prog==="4-Day"?"on":"")+'">4-Day split</button>'
    +'<button data-prog="3-Day" class="'+(S.prog==="3-Day"?"on":"")+'">3-Day split</button></div>';
  h+='<div class="days" id="dayrow">'+dd.map(function(x,i){var p=x.t.split(" · ");
     return '<button class="chip '+(i===S.day?"on":"")+'" data-d="'+i+'"><b>'+p[0]+'</b><small>'+(p[1]||"")+'</small></button>';}).join("")+'</div>';
  // hero
  h+='<div class="hero"><div class="ring">'+ring(frac,104,10,47)
    +'<div class="val"><b>'+pct+'%</b><small>'+done+'/'+tot+' SETS</small></div></div>'
    +'<div class="info"><h3>'+(complete?"Session complete 💪":parts[1]||parts[0])+'</h3>'
    +'<p>'+(complete?"Great work — log your weights and rest up.":(done>0?"Keep going — "+(tot-done)+" sets to go.":"Let's get after it."))+'</p>'
    +'<div class="tip">'+DATA[S.person].banner+'</div></div></div>';
  // exercises
  d.x.forEach(function(ex,i){
    var name=ex[0],sets=ex[1],reps=ex[2],w=ex[3],rest=ex[4],note=ex[5];
    var a=checks[i]||[], cdone=0; for(var s=0;s<sets;s++) if(a[s]) cdone++;
    var isDone=cdone===sets;
    var sw=store.get(wkey(S.day,i), w);
    h+='<div class="ex '+(isDone?"done":"")+'" style="animation-delay:'+(i*0.03)+'s">';
    h+='<div class="top"><div class="nm">'+name+'</div><div class="badge">'+(isDone?ICON.check:(i+1))+'</div></div>';
    h+='<div class="tags"><span class="tag">'+ICON.layers+sets+' × '+reps+'</span>'
      +'<span class="tag rest" data-rest="'+rest+'">'+ICON.clock+rest+'</span></div>';
    if(isNum(sw)){
      h+='<div class="wt"><span class="lab">Working weight</span>'
        +'<div class="stp" data-step="-1" data-i="'+i+'">−</div>'
        +'<div class="num"><input inputmode="decimal" data-w="'+i+'" value="'+sw+'"><span>kg</span></div>'
        +'<div class="stp" data-step="1" data-i="'+i+'">+</div></div>';
    } else {
      h+='<div class="wt"><span class="lab">Working weight</span><div class="bw">'+sw+'</div></div>';
    }
    h+='<div class="sets">';
    for(var s2=0;s2<sets;s2++){ var on=a[s2]; h+='<div class="pill '+(on?"on":"")+'" data-i="'+i+'" data-s="'+s2+'">'+(on?ICON.check:(s2+1))+'</div>'; }
    h+='</div>';
    if(note) h+='<p class="note">'+note+'</p>';
    h+='</div>';
  });
  h+='</div>';
  $("root").innerHTML=h;
  // wire
  Array.prototype.forEach.call($("seg").children,function(b){ b.onclick=function(){ S.prog=b.dataset.prog; S.day=0; store.set("s_prog",S.prog); renderToday(); }; });
  Array.prototype.forEach.call($("dayrow").children,function(b){ b.onclick=function(){ S.day=+b.dataset.d; renderToday(); }; });
  Array.prototype.forEach.call(document.querySelectorAll(".pill"),function(p){ p.onclick=function(){
    var i=+p.dataset.i,s=+p.dataset.s,c=store.get(ckey(),{}); if(!c[i])c[i]=[]; c[i][s]=!c[i][s]; store.set(ckey(),c);
    if(c[i][s]&&navigator.vibrate){try{navigator.vibrate(14);}catch(e){}} renderToday();
  };});
  Array.prototype.forEach.call(document.querySelectorAll(".stp"),function(b){ b.onclick=function(){
    var i=+b.dataset.i, inp=document.querySelector('input[data-w="'+i+'"]'); var v=parseFloat(inp.value)||0;
    v=Math.max(0, Math.round((v+2.5*(+b.dataset.step))*10)/10); inp.value=v; store.set(wkey(S.day,i), String(v));
    if(navigator.vibrate){try{navigator.vibrate(8);}catch(e){}}
  };});
  Array.prototype.forEach.call(document.querySelectorAll('input[data-w]'),function(inp){ inp.onchange=function(){ store.set(wkey(S.day,+inp.dataset.w), inp.value.trim()); }; });
  Array.prototype.forEach.call(document.querySelectorAll(".tag.rest"),function(t){ t.onclick=function(){ startTimer(t.dataset.rest); }; });
}

/* ---------- PROGRESS ---------- */
function renderProgress(){
  var dd=days();
  var moved=0,total=0;
  var body="";
  dd.forEach(function(d,di){
    body+='<div class="daylabel">'+d.t+'</div><div class="pcard">';
    d.x.forEach(function(ex,i){ var start=ex[3]; var cur=store.get(wkey(di,i),start);
      var up = isNum(cur)&&isNum(start)&&parseFloat(cur)>parseFloat(start);
      if(isNum(start)) total++; if(up) moved++;
      body+='<div class="prow"><span class="exn">'+ex[0]+'</span><span class="w">'+cur+(isNum(cur)?' kg':'')+(up?'<span class="up">▲</span>':'')+'</span></div>';
    });
    body+='</div>';
  });
  var pct=total?Math.round(moved/total*100):0;
  var h='<div class="view"><div class="h1">Progress</div><div class="sub">'+DATA[S.person].name+' · current working weights vs. start</div>';
  h+='<div class="hero" style="margin-bottom:18px"><div class="ring">'+ring(total?moved/total:0,104,10,47)
    +'<div class="val"><b>'+moved+'</b><small>LIFTS UP</small></div></div>'
    +'<div class="info"><h3>You\'re progressing</h3><p>'+moved+' of '+total+' lifts are above their starting weight ('+pct+'%).</p>'
    +'<div class="tip">Update a weight on the Today tab and it shows here. Also log body measurements every 2–4 weeks in your Excel tracker.</div></div></div>';
  h+=body+'</div>';
  $("root").innerHTML=h;
}

/* ---------- GUIDE ---------- */
function renderGuide(){
  var rows=CHEAT[S.person];
  var h='<div class="view"><div class="h1">Guide</div><div class="sub">'+DATA[S.person].name+' · quick reference</div>';
  rows.forEach(function(r){ h+='<div class="gcard"><div class="gh"><div class="gi">'+ICON[r[0]]+'</div><h4>'+r[1]+'</h4></div><p>'+r[2]+'</p></div>'; });
  h+='<div class="disc">General information, not medical advice. Start each lift so the first set leaves ~3–4 reps in the tank.<br>Companion to your Excel workbook &amp; PDF guide.</div></div>';
  $("root").innerHTML=h;
}

function render(){ theme(); renderNav();
  if(S.tab==="today") renderToday(); else if(S.tab==="progress") renderProgress(); else renderGuide();
  window.scrollTo(0,0);
}

/* person switch */
Array.prototype.forEach.call($("who").children,function(b){ b.onclick=function(){ S.person=b.dataset.person; S.day=0; store.set("s_person",S.person); render(); }; });

/* ---------- REST TIMER ---------- */
var T={id:null,left:0,total:0,C:2*Math.PI*86};
function parseRest(str){ if(!str) return 90; str=(""+str).toLowerCase(); var n=parseInt((str.match(/\d+/)||[90])[0],10);
  if(str.indexOf("min")>-1){ if(str.indexOf("2–3")>-1||str.indexOf("2-3")>-1) return 150; return n*60; } return n; }
function fmt(s){ s=Math.max(s,0); var m=Math.floor(s/60),r=s%60; return m+":"+(r<10?"0":"")+r; }
function beep(){ try{ var a=new (window.AudioContext||window.webkitAudioContext)(); var o=a.createOscillator(),g=a.createGain();
  o.connect(g); g.connect(a.destination); o.type="sine"; o.frequency.value=880; g.gain.setValueAtTime(.0001,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.35,a.currentTime+.02); g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.55);
  o.start(); o.stop(a.currentTime+.55);}catch(e){} }
function drawT(){ var frac=T.total?T.left/T.total:0; $("tprog").setAttribute("stroke-dashoffset",(T.C*(1-frac)).toFixed(1)); $("tv").textContent=fmt(T.left); }
function tick(){ T.left--; drawT(); if(T.left<=0){ clearInterval(T.id); T.id=null; beep(); if(navigator.vibrate){try{navigator.vibrate([120,60,120]);}catch(e){}} $("tv").textContent="Go!"; setTimeout(hideT,1400); } }
function startTimer(rest){ var sec=parseRest(rest); T.left=sec; T.total=sec; $("tlbl").textContent="Rest — "+rest; drawT();
  $("modal").classList.add("show"); if(T.id)clearInterval(T.id); T.id=setInterval(tick,1000); beep(); }
function hideT(){ $("modal").classList.remove("show"); if(T.id){clearInterval(T.id);T.id=null;} }
$("tDone").onclick=hideT;
$("tPlus").onclick=function(){ T.left+=15; T.total=Math.max(T.total,T.left); drawT(); };
$("tMinus").onclick=function(){ T.left=Math.max(1,T.left-15); drawT(); };
$("modal").onclick=function(e){ if(e.target===$("modal")) hideT(); };

/* init */
render();
</script>
